services:
  - type: web
    name: ctas-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: NER_API_URL
        sync: false
      - key: CLF_API_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
